name: CI - Dev Branch (Run + Endpoint Test)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run application
        run: |
          nohup mvn spring-boot:run -Dspring-boot.run.profiles=ci &
          sleep 20

      - name: Test endpoint
        run: curl --fail http://localhost:8080/test