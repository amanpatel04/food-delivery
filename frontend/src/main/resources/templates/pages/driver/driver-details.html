<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layouts/base :: layout(~{::section})">

<section>
    <h2>Driver Details</h2>

    <div class="card">
        <p><strong>ID:</strong> <span th:text="${driver.id}"></span></p>
        <p><strong>Name:</strong> <span th:text="${driver.name}"></span></p>
        <p><strong>Status:</strong> <span th:text="${driver.status}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${driver.phone}"></span></p>
        <p><strong>Total Orders:</strong> <span th:text="${totalOrders}"></span></p>
    </div>

    <div class="actions">
        <a th:href="@{/drivers/{id}/orders(id=${driver.id})}" class="btn btn-primary">Orders</a>
        <a th:href="@{/drivers/{id}/customers(id=${driver.id})}" class="btn btn-secondary">Customers</a>
        <a th:href="@{/drivers/{id}/restaurants(id=${driver.id})}" class="btn btn-secondary">Restaurants</a>
    </div>
</section>
</html>
