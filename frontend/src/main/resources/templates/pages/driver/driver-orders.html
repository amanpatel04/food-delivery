<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layouts/orders-base :: layout(~{::section})">

<section>
    <h2>Driver Orders</h2>

    <table class="table">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Status</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.status}"></td>
                <td th:text="${order.amount}"></td>
            </tr>
        </tbody>
    </table>
</section>
</html>
