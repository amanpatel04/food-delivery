<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layouts/base :: layout(~{::section})">

<section>
    <h2>Driver Restaurants</h2>

    <table class="table">
        <thead>
            <tr>
                <th>Restaurant ID</th>
                <th>Name</th>
                <th>Location</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="restaurant : ${restaurants}">
                <td th:text="${restaurant.id}"></td>
                <td th:text="${restaurant.name}"></td>
                <td th:text="${restaurant.location}"></td>
            </tr>
        </tbody>
    </table>
</section>
</html>
