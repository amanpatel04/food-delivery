<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driver Details</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Driver Details</h2>
        <p class="text-gray-500">View driver information and actions</p>
    </div>

    <!-- Driver Card -->
    <div th:if="${driver != null}"
         class="bg-white shadow-lg rounded-2xl p-6 space-y-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div>
                <p class="text-gray-500 text-sm">Driver ID</p>
                <p class="text-lg font-semibold" th:text="${driver.driverId}"></p>
            </div>

            <div>
                <p class="text-gray-500 text-sm">Name</p>
                <p class="text-lg font-semibold" th:text="${driver.driverName}"></p>
            </div>

            <div>
                <p class="text-gray-500 text-sm">Phone</p>
                <p class="text-lg font-semibold" th:text="${driver.driverPhone}"></p>
            </div>

            <div>
                <p class="text-gray-500 text-sm">Vehicle</p>
                <p class="text-lg font-semibold" th:text="${driver.driverVehicle}"></p>
            </div>

        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-4 pt-4">

            <a th:href="@{/drivers/{id}/orders(id=${driver.driverId})}"
               class="bg-green-500 text-white px-5 py-2 rounded-xl hover:bg-green-600 transition">
                📦 Orders
            </a>

            <a th:href="@{/drivers/{id}/customers(id=${driver.driverId})}"
               class="bg-blue-500 text-white px-5 py-2 rounded-xl hover:bg-blue-600 transition">
                👥 Customers
            </a>

            <a th:href="@{/drivers/{id}/restaurants(id=${driver.driverId})}"
               class="bg-purple-500 text-white px-5 py-2 rounded-xl hover:bg-purple-600 transition">
                🍽 Restaurants
            </a>

        </div>

    </div>

    <!-- Fallback -->
    <div th:if="${driver == null}"
         class="bg-white shadow rounded-xl p-6 text-center text-red-500">
        Driver not found
    </div>

    <!-- Back Button -->
    <div class="mt-6 text-center">
        <a href="/drivers/dashboard"
           class="inline-block bg-gray-800 text-white px-6 py-2 rounded-xl hover:bg-gray-900 transition">
            ⬅ Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
