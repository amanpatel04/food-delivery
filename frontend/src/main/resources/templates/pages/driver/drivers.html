<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drivers</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-5xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Drivers</h2>
        <p class="text-gray-500">List of all delivery drivers</p>
    </div>

    <!-- Card -->
    <div class="bg-white shadow-lg rounded-2xl p-6 overflow-x-auto">

        <table class="w-full border-collapse">

            <!-- Table Header -->
            <thead>
            <tr class="bg-green-100 text-gray-700 text-left">
                <th class="p-3 rounded-tl-xl">ID</th>
                <th class="p-3">Name</th>
                <th class="p-3">Vehicle</th>
                <th class="p-3">Phone</th>
                <th class="p-3 rounded-tr-xl">Action</th>
            </tr>
            </thead>

            <!-- Table Body -->
            <tbody>
            <tr th:each="driver : ${drivers}"
                class="border-b hover:bg-gray-50 transition">

                <td class="p-3 font-medium"
                    th:text="${driver.driverId}"></td>

                <td class="p-3"
                    th:text="${driver.driverName}"></td>

                <!-- Vehicle as badge -->
                <td class="p-3">
                        <span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm"
                              th:text="${driver.driverVehicle}">
                        </span>
                </td>

                <td class="p-3 text-gray-600"
                    th:text="${driver.driverPhone}"></td>

                <td class="p-3">
                    <a th:href="@{/drivers/{id}(id=${driver.driverId})}"
                       class="bg-blue-500 text-white px-4 py-1 rounded-lg hover:bg-blue-600 transition text-sm">
                        View
                    </a>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

    <!-- Back Button -->
    <div class="mt-6 text-center">
        <a href="/drivers/dashboard"
           class="inline-block bg-gray-800 text-white px-6 py-2 rounded-xl hover:bg-gray-900 transition">
            ⬅ Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
