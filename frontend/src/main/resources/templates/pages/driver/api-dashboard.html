<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>API Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-5xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800">API Dashboard</h1>
        <p class="text-gray-600 mt-2">Test all APIs from one place</p>
    </div>

    <!-- Driver APIs -->
    <div class="bg-white shadow-lg rounded-2xl p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4 text-green-600">
            <i class="fa fa-truck"></i> Driver APIs
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <!-- Get All Drivers -->
            <a href="/drivers"
               class="bg-blue-400 text-white p-4 rounded-xl text-center hover:bg-blue-400">
                Get All Drivers
            </a>

            <!-- Driver Details -->
            <div class="flex gap-2">
                <input id="driverId" type="number" placeholder="Driver ID"
                       class="border rounded-xl px-3 py-2 w-full"/>
                <button onclick="goToDriver()"
                        class="bg-blue-400 text-white px-4 rounded-xl">
                    View
                </button>
            </div>

            <!-- Orders -->
            <button onclick="goTo('/orders')"
                    class="bg-blue-400 text-white p-4 rounded-xl hover:bg-blue-400">
                Driver Orders
            </button>

            <!-- Customers -->
            <button onclick="goTo('/customers')"
                    class="bg-blue-400 text-white p-4 rounded-xl hover:bg-blue-400">
                Driver Customers
            </button>

            <!-- Restaurants -->
            <button onclick="goTo('/restaurants')"
                    class="bg-blue-400 text-white p-4 rounded-xl hover:bg-blue-400">
                Driver Restaurants
            </button>

        </div>
    </div>

</div>

<script>

    function goToDriver() {
        const id = document.getElementById("driverId").value;

        if (!id) {
            alert("Enter Driver ID");
            return;
        }

        window.location.href = `/drivers/${id}`;
    }

    function goTo(path) {
        const id = document.getElementById("driverId").value;

        if (!id) {
            alert("Enter Driver ID first");
            return;
        }

        window.location.href = `/drivers/${id}${path}`;
    }

</script>

</body>
</html>
